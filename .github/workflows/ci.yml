name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: node ${{ matrix.node }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # Zero-dependency package: no install step needed.
      - name: Syntax check
        run: npm run check
      - name: Tests
        run: npm test
      - name: Package hygiene (tarball allow-list)
        run: npm pack --dry-run
